<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>魔導語彙録 - ケルトの古書 -</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-deep: #1B3B2B; --moss: #3D6346; --gold: #C5A059;
        --ivory: #F4F1EA; --dark-text: #2c271e; --danger: #a93226;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    body {
        background-color: var(--bg-deep); color: var(--ivory);
        font-family: 'Shippori Mincho', serif;
        background-image: radial-gradient(circle at 10% 20%, rgba(197, 160, 89, 0.08) 0%, transparent 25%),
                          radial-gradient(circle at 90% 80%, rgba(197, 160, 89, 0.08) 0%, transparent 25%);
        background-attachment: fixed;
    }
    header { text-align: center; padding: 15px; border-bottom: 2px solid var(--gold); background: rgba(0,0,0,0.3); }
    h1 { font-size: 1.5rem; color: var(--gold); letter-spacing: 2px; }
    
    .nav-bar { display: flex; justify-content: space-around; background: rgba(0,0,0,0.5); padding: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--gold); }
    .nav-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; border-radius: 4px; font-family: inherit; font-weight: bold; cursor: pointer; transition: 0.3s; flex: 1; margin: 0 5px; }
    .nav-btn.active, .nav-btn:hover { background: var(--gold); color: var(--bg-deep); }
    
    .container { max-width: 600px; margin: 0 auto; padding: 20px; padding-bottom: 80px; }
    .view { display: none; animation: fadeIn 0.3s; }
    .view.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* レッスンリスト */
    .lesson-card { background: rgba(0,0,0,0.3); border: 1px solid var(--gold); border-radius: 8px; padding: 15px; margin-bottom: 15px; }
    .lesson-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .lesson-title { font-size: 1.2rem; font-weight: bold; color: var(--gold); }
    .lesson-progress-text { font-size: 0.9rem; opacity: 0.8; }
    .progress-bar-bg { width: 100%; height: 6px; background: rgba(244, 241, 234, 0.2); border-radius: 3px; overflow: hidden; margin-bottom: 15px; }
    .progress-bar-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.3s; }
    .lesson-actions { display: flex; gap: 10px; }
    .action-btn { flex: 1; padding: 10px; background: var(--moss); color: var(--ivory); border: 1px solid var(--gold); border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 1rem; transition: 0.2s; }
    .action-btn:hover { background: var(--gold); color: var(--bg-deep); }
    
    /* フラッシュカード */
    .fc-container { perspective: 1000px; width: 100%; height: 300px; margin: 20px 0; }
    .fc-card { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; cursor: pointer; }
    .fc-card.flipped { transform: rotateY(180deg); }
    .fc-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--ivory); color: var(--dark-text); border: 3px solid var(--gold); border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    .fc-front { font-size: 2.5rem; font-weight: bold; }
    .fc-back { transform: rotateY(180deg); background: #2c271e; color: var(--gold); border-color: var(--moss); }
    .fc-back .en-mini { font-size: 1.2rem; opacity: 0.7; margin-bottom: 15px; color: var(--ivory); }
    .fc-back .ja { font-size: 2rem; font-weight: bold; color: var(--ivory); }
    
    .judge-btns { display: flex; gap: 15px; }
    .btn-weak { background: transparent; color: var(--ivory); border: 1px solid var(--ivory); flex: 1; padding: 15px; border-radius: 8px; font-size: 1.2rem; cursor: pointer; }
    .btn-master { background: var(--moss); color: var(--ivory); border: 1px solid var(--gold); flex: 1; padding: 15px; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }

    /* テスト */
    .test-word { font-size: 2.5rem; text-align: center; color: var(--gold); margin: 30px 0; font-weight: bold; }
    .test-options { display: flex; flex-direction: column; gap: 12px; }
    .test-opt-btn { padding: 18px; font-size: 1.2rem; background: rgba(0,0,0,0.4); border: 1px solid var(--gold); color: var(--ivory); border-radius: 8px; cursor: pointer; text-align: left; font-family: inherit; transition: 0.2s; }
    .test-opt-btn.correct { background: var(--moss); border-color: var(--ivory); }
    .test-opt-btn.wrong { background: var(--danger); border-color: var(--ivory); }
    
    /* 辞書 */
    .search-box { width: 100%; padding: 15px; background: rgba(255,255,255,0.1); border: 1px solid var(--gold); color: var(--ivory); border-radius: 8px; font-family: inherit; font-size: 1.1rem; margin-bottom: 20px; outline: none; }
    .dict-list { max-height: 60vh; overflow-y: auto; }
    .dict-item { padding: 15px; border-bottom: 1px solid rgba(197, 160, 89, 0.3); display: flex; flex-direction: column; gap: 5px; }
    .dict-en { font-size: 1.3rem; font-weight: bold; color: var(--gold); }
    .dict-ja { font-size: 1.1rem; }
    .dict-meta { font-size: 0.8rem; opacity: 0.6; }

    /* ステータスヘッダー */
    .session-header { text-align: center; margin-bottom: 15px; }
    .session-title { font-size: 1.2rem; color: var(--gold); margin-bottom: 5px; }
</style>
</head>
<body>

<header><h1>魔導語彙録</h1></header>

<div class="nav-bar">
    <button class="nav-btn active" onclick="nav('home', this)">修練の間</button>
    <button class="nav-btn" onclick="nav('dict', this)">魔導書庫</button>
</div>

<div class="container">
    <!-- ホーム (レッスン一覧) -->
    <div id="view-home" class="view active">
        <p style="text-align: center; margin-bottom: 20px; opacity: 0.8;">全2027の魔導呪文を50ずつの章に分割</p>
        <div id="lesson-list"></div>
    </div>

    <!-- フラッシュカード -->
    <div id="view-card" class="view">
        <div class="session-header">
            <div class="session-title" id="card-session-title">Stage 1 - Lesson 1</div>
            <div id="card-progress-text">1 / 50</div>
        </div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="card-progress-bar"></div></div>
        
        <div class="fc-container" onclick="document.getElementById('fc-card').classList.toggle('flipped')">
            <div class="fc-card" id="fc-card">
                <div class="fc-face fc-front" id="card-en">Word</div>
                <div class="fc-face fc-back">
                    <div class="en-mini" id="card-en-back">Word</div>
                    <div class="ja" id="card-ja">意味</div>
                </div>
            </div>
        </div>
        
        <div class="judge-btns">
            <button class="btn-weak" onclick="judgeCard(false)">もう一度</button>
            <button class="btn-master" onclick="judgeCard(true)">習得した</button>
        </div>
        <button class="nav-btn" style="width: 100%; margin-top: 20px;" onclick="nav('home', document.querySelectorAll('.nav-btn')[0])">中断して戻る</button>
    </div>

    <!-- テスト -->
    <div id="view-test" class="view">
        <div class="session-header">
            <div class="session-title" id="test-session-title">Stage 1 - Lesson 1</div>
            <div id="test-progress-text">1 / 50</div>
        </div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="test-progress-bar"></div></div>
        
        <div class="test-word" id="test-q">Word</div>
        <div class="test-options" id="test-opts"></div>
        <button class="nav-btn" style="width: 100%; margin-top: 30px;" onclick="nav('home', document.querySelectorAll('.nav-btn')[0])">中断して戻る</button>
    </div>

    <!-- 辞書 -->
    <div id="view-dict" class="view">
        <input type="text" id="search-input" class="search-box" placeholder="呪文（英・日）を検索..." oninput="filterDict()">
        <div class="dict-list" id="dict-list"></div>
    </div>
</div>

    function renderHome() {

        listEl.innerHTML = '';
        
        lessons.forEach((lesson, i) => {
            const stageNum = Math.floor(i / 12) + 1; // 600 words per stage = 12 lessons
            const lessonNum = (i % 12) + 1;
            const learnedIds = progress[i] || [];
            const percent = Math.round((learnedIds.length / lesson.length) * 100);
            
            listEl.innerHTML += `
                <div class="lesson-card">
                    <div class="lesson-header">
                        <div class="lesson-title">Stage ${stageNum} - Lesson ${lessonNum}</div>

    function startSession(idx, mode) {

        if (currentQueue.length === 0) {

        const lessonNum = (idx % 12) + 1;

                } else {
                    btn.classList.add('wrong');
                    optsContainer.childNodes.forEach(b => { if(b.innerText === w.ja) b.classList.add('correct'); });
                }
                setTimeout(() => { currentIndex++; showTest(); }, 1000);
            };
            optsContainer.appendChild(btn);
        });
    }

    function markAsLearned(id) {
        if(!progress[currentLessonIndex]) progress[currentLessonIndex] = [];
        if(!progress[currentLessonIndex].includes(id)) {
            progress[currentLessonIndex].push(id);
            localStorage.setItem('vocab_isekai_prog', JSON.stringify(progress));
        }
    }

    function finishSession() {
        alert("見事だ！この修練を完了した。");
        nav('home', document.querySelectorAll('.nav-btn')[0]);
    }

    // --- 辞書ロジック ---
    function renderDict(data) {
        const listEl = document.getElementById('dict-list');
        listEl.innerHTML = data.map(w => `
            <div class="dict-item">
                <div class="dict-en">${w.en}</div>
                <div class="dict-ja">${w.ja}</div>
                <div class="dict-meta">No. ${w.id}</div>
            </div>
        `).join('');
    }

    function filterDict() {
        const q = document.getElementById('search-input').value.toLowerCase();
        if(!q) return renderDict(ALL_WORDS.slice(0, 100));
        renderDict(ALL_WORDS.filter(w => w.en.toLowerCase().includes(q) || w.ja.includes(q) || String(w.id) === q).slice(0, 150));
    }
</script>
</body>
</html>
